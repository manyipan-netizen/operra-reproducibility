services:
  pyverse:
    image: ghcr.io/a1eksb/reproducability:rstudio
    build: !reset null
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8787"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CODESPACE_NAME: ${CODESPACE_NAME}
      GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN: ${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN}
    volumes:
      - .devcontainer/rstudio/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      pyverse:
        condition: service_healthy